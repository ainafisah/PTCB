<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Parent Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

:root{
--primary:#2E7D32;
--secondary:#4CAF50;
--light:#E8F5E9;
--white:#fff;
}

body{
background:var(--light);
}

header{
background:linear-gradient(
135deg,
var(--primary),
var(--secondary)
);
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logout{
background:#d32f2f;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat-card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
text-align:center;
}

.stat-card h3{
color:var(--primary);
margin-bottom:10px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h2{
color:var(--primary);
margin-bottom:15px;
}

.student-info{
line-height:2;
}

.progress-item{
padding:15px;
background:#f5f5f5;
border-radius:10px;
margin-bottom:10px;
}

.badge{
background:#4CAF50;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.attendance{
font-size:18px;
font-weight:bold;
color:var(--primary);
}

@media(max-width:768px){

header{
flex-direction:column;
gap:10px;
}

}

</style>
</head>

<body>

<script>

if(localStorage.getItem("role")!=="parent"){
window.location="index.html";
}

</script>

<header>

<h1>👨‍👩‍👧 Parent Dashboard</h1>

<button class="logout" onclick="logout()">
Logout
</button>

</header>

<div class="container">

<div class="stats">

<div class="stat-card">
<h3>Progress Reports</h3>
<h1 id="reportCount">0</h1>
</div>

<div class="stat-card">
<h3>Attendance</h3>
<h1>95%</h1>
</div>

<div class="stat-card">
<h3>Subjects</h3>
<h1>3</h1>
</div>

</div>

<div class="card">

<h2>👦 Student Information</h2>

<div class="student-info">

<p><b>Name:</b> Ali Ahmad</p>

<p><b>Level:</b> Year 5</p>

<p><b>Subject:</b> Mathematics</p>

<p><b>Teacher:</b> PTCB Teacher</p>

</div>

</div>

<div class="card">

<h2>📈 Attendance</h2>

<p class="attendance">
95% Attendance Rate
</p>

</div>

<div class="card">

<h2>📝 Teacher Feedback & Progress Reports</h2>

<div id="progressReports">

No reports available

</div>

</div>

</div>

<script>

function logout(){

    sessionStorage.clear();

    localStorage.removeItem("role");
    localStorage.removeItem("userEmail");

    window.location.replace("index.html");

}

function loadReports(){

let reports=
JSON.parse(
localStorage.getItem("updates")
)||[];

let container=
document.getElementById(
"progressReports"
);

if(reports.length===0){

container.innerHTML=
"No reports available";

}else{

container.innerHTML="";

reports.forEach(r=>{

container.innerHTML+=`

<div class="progress-item">

<p>
<b>Student:</b>
${r.student}
</p>

<p>
<b>Feedback:</b>
${r.comment}
</p>

<p>
<b>Teacher:</b>
${r.teacher || "PTCB Teacher"}
</p>

<p>
<b>Status:</b>
<span class="badge">
Updated
</span>
</p>

</div>

`;

});

}

document.getElementById(
"reportCount"
).innerText=
reports.length;

}

loadReports();

</script>

</body>
</html>
